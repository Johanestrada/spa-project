#comando para der el nombre del flujo
name: CI pipeline

#Idica cuando se ejecuta el flujo
on:
  pull_request:
  push:
    branches:
    - develop

#Acciones que se ejecutaran en el servidor
jobs:
  frontend-build:
    runs-on: ubuntu-latest

    #configuraciones por defecto
    defaults:
      run:
        working-directory: frontend #direccion que se levantara

      #pasos para levantar proyecto
      steps:
        - name: Checkout repository (git clone)
          uses: actions/checkout@v4

        - name: Setup node (instalar node) 
          uses: actions/setup-node@v4
          with:
            node-version: '20'
        
        - name: Instalar dependencias
          run: npm install
        
        - name: Construir el frontend
          run: npm run build